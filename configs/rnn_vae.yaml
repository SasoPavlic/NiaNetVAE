model_params:
  name: 'RNNVAE'
  seq_len: 140
  n_features: 1 #Multiple features problem https://stackoverflow.com/questions/71565854/lstm-autoencoder-set-up-for-multiple-features-using-pytorch

data_params:
  data_path: "data/"
  batch_size: 100
  num_workers: 0

exp_params:
  weight_decay: 0.0
  kld_weight: 0.1
  manual_seed: 1265

trainer_params:
  gpus: [ 0 ]
  min_epochs: 1
  max_epochs: 1

early_stop:
  monitor: "val_loss"
  patience: 1
  min_delta: 0.00

logging_params:
  name: "RNNVAE"
  save_dir: "logs/"
  db_storage: "solution.db"
