# Main runtime configuration for NiaNetVAE.
# This file defines search, objectives, training defaults, logging/export,
# and dataset profile selection.

nia_search:
  nsga3:
    # NSGA-III search-size control.
    # For 3 objectives, Das-Dennis reference directions produce:
    #   effective_population = len(ref_dirs)
    #   = (n_partitions + 2) * (n_partitions + 1) / 2
    # Examples:
    #   n_partitions=1 -> 3 individuals
    #   n_partitions=5 -> 21 individuals
    # Larger values improve tradeoff exploration but increase runtime.
    n_partitions: 1

  # Search-time budget per cycle (NSGA loop termination).
  # Format: HH:MM:SS
  # Note: total cycle wall time is usually longer than this because final
  # winner retraining and export run after search terminates.
  time: "00:01:00"

  # Metrics printed in iteration logs for visibility.
  # Optimization objectives are configured under objectives.* below.
  metrics:
    - SMAPE

  warm_start:
    # Warm-start settings for per-cycle search (k > 0).
    # The initial population is built from:
    # - carry-over candidates from previous trained cycle
    # - perturbed candidates from previous trained cycle
    # - random candidates
    # Ratios are applied to effective_population.
    enabled: true
    carry_over_ratio: 0.10
    perturb_ratio: 0.40
    perturbation_strength: 0.08

objectives:
  # Multi-objective contract used by search and DB persistence.
  # All objectives are minimized:
  # - obj_error: reconstruction metric value
  # - obj_efficiency: efficiency backend value
  # - obj_pdm: 1 - pdm_smoothed_auroc
  #
  # MetroPT PdM labeling semantics (aligned with metropt-pdm-framework):
  # - evaluate only test windows from phases 0 and 1
  # - positive class is phase 1
  # - phase 2 excluded
  error:
    # Single reconstruction metric for obj_error.
    # Allowed: MAE|MSE|RMSE|MAPE|RMAPE|SMAPE
    metric: SMAPE

  efficiency:
    # Efficiency backend for obj_efficiency.
    # Allowed:
    # - params: parameter count
    # - macs: estimated multiply-accumulate cost
    # - latency_ms: measured inference latency
    metric: macs

  pdm:
    # Smoothed ranking PdM proxy.
    # Pipeline: window_reconstruction_error -> risk_score -> smoothed_risk_score -> smoothed_rank_gap.
    # Downstream metropt thresholds/coverage/recall remain evaluation-only.
    metric: smoothed_rank_gap
    # Trailing rolling mean window over ordered test windows, reset per segment.
    smoothing_window_windows: 480

  selection:
    # Deterministic winner selection after search:
    # 1) use DB candidate pool for current cycle dataset_name
    # 2) keep Pareto front on [obj_error, obj_efficiency, obj_pdm]
    # 3) min-max normalize per objective on that pool
    # 4) select smallest weighted distance to ideal point (0,0,0)
    # 5) tie-break by obj_pdm -> obj_error -> obj_efficiency
    # Allowed methods: weighted_ideal_distance
    method: weighted_ideal_distance
    weights:
      # Relative preference weights for winner selection.
      # Weights are normalized internally (sum to 1).
      error: 0.30
      efficiency: 0.01
      pdm: 0.69

workflow:
  # Runtime workflow mode:
  # - per_maint_baseline_search: independent per-cycle architecture search
  # - per_maint_finetune_search: per-cycle fine-tuning from previous trained cycle
  # - per_maint_warmstart_search: per-cycle warm-started NSGA-III search
  mode: "per_maint_finetune_search"

  finetune:
    # Fine-tune policy used only in mode=per_maint_finetune_search for cycle_id > 0.
    # finetune_learning_rate = exp_params.learning_rate * learning_rate_scale
    learning_rate_scale: 0.1
    min_epochs: 2
    max_epochs: 2

# Model constructor parameters passed into RNNVAE.
model_params:
  name: 'RecurrentVariationalAutoencoder'

# Trainer defaults for candidate and final training passes.
# Lower values reduce runtime; higher values may improve fit quality.
trainer_params:
  min_epochs: 2
  max_epochs: 2

# Shared training policy and global seed.
# In the architecture-only methodology, optimizer is fixed for all candidates.
exp_params:
  optimizer: Adam
  learning_rate: 0.003
  weight_decay: 0.0
  kld_weight: 0.1
  manual_seed: 42

# Logging, DB backend, and artifact export settings.
logging_params:
  name: "RNNVAE"
  logger_file: "RNNAutoencoder.log"
  save_dir: "logs"                  # local run outputs
  db_storage: "logs/solutions.db"   # used when db_backend=sqlite
  db_table_name: "per_maint_vae_finetune"  # isolated table for smoothed-rank objective runs
  db_backend: "postgres"            # postgres or sqlite
  db_wait_seconds: 1800             # max wait for DB recovery before winner-selection fallback/fail
  db_wait_poll_seconds: 30          # retry poll interval while waiting for DB recovery
  export_enabled: true               # write model/meta/summary export artifacts
  model_export_dir: "logs/per_maint_vae_finetune"

# DataLoader runtime settings.
# num_workers is a major speed lever for CPU-side input pipeline throughput.
data_loader_params:
  data_percentage: 100   # use subset (<100) for quick debug runs
  batch_size: 64
  val_size: 10           # percent of train windows for validation
  num_workers: 8
  persistent_workers: True
  pin_memory: True

# Dataset profile file selected at startup.
# The referenced file defines data_params for the active dataset/regime.
dataset:
  config_file: "configs/metropt_config.yaml"

