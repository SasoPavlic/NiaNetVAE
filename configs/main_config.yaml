nia_search:
  runs: 1
  evaluations: 100
  algorithms:
    - particle_swarm
    - genetic_algorithm
    - firefly_algorithm
    - differential_evolution
    - self_adaptive_differential_evolution

data_params:
  dataset_type: "UCR"
  data_path: "data/ucr_dataset/internal_bleeding/"
  filename: "132_UCR_Anomaly_InternalBleeding10_3200_4526_4556.txt"
  seq_len: 100
  n_features: 1
  data_percentage: 100
  batch_size: 8
  train_size: 70
  val_size: 10
  test_size: 20
  num_workers: 0
  persistent_workers: False
  pin_memory: True

trainer_params:
  min_epochs: 1
  max_epochs: 2

early_stop:
  monitor: "val_loss"
  patience: 1
  min_delta: 0.00
  mode: "min"

fine_tune_lr_finder:
  tune_n_epochs: 5
  lr_finder:
    mode: "exponential" #"linear"
    num_training_steps: 10
    attr_name: "learning_rate"
    update_attr: True
    early_stop_threshold: # None # https://github.com/Lightning-AI/lightning/issues/4846#issuecomment-1014148839

model_params:
  name: 'RecurrentVariationalAutoencoder'

exp_params:
  weight_decay: 0.001
  kld_weight: 0.1
  manual_seed: 42

logging_params:
  name: "RNNVAE"
  logger_file: "RNNAutoencoder.log"
  save_dir: "logs/"
  db_storage: "logs/solution.db"

  # +------------+------------+-------+------------+------------+----------+-------------------+---------------+
  # | Benchmark  | # datasets | # dims| Train size | Test size  | Anomaly% | Path              | Max Seq Length    |
  # +------------+------------+-------+------------+------------+----------+-------------------+---------------+
  # | MSL        | 27         | 55    | 58,317     | 73,729     | 10.72%   | msl_dataset       |               |
  # | SMAP       | 55         | 25    | 140,825    | 444,035    | 13.13%   | smap_dataset      |               |
  # | SMD        | 28         | 38    | 708,405    | 708,420    | 4.16%    | smd_dataset       |               |
  # | SWaT       | 1          | 51    | 496,800    | 449,919    | 12.33%   | swat_dataset      |               |
  # | WADI       | 1          | 123   | 784,568    | 172,801    | 5.77%    | wadi_dataset      |               |
  # | Yahoo-A1   | 67         | 1     | 46,667     | 46,717     | 1.76%    | yahoo_dataset     |               |
  # | KPI        | 29         | 1     | 1,048,576  | 2,918,847  | 1.87%    | kpi_dataset       |               |
  # | ECG5000    | 1          | 1     | 3,500      | 1,500      | 1.00%    | ecg5000_dataset   | 140           |
  # +------------+------------+-------+------------+------------+----------+-------------------+---------------+
  #TODO Use bellow keys together with parameters
  datasets:
    - name: MSL
      n_features: 55
      seq_len: 100
      path: msl_dataset

    - name: SMAP
      n_features: 25
      seq_len: 100
      path: smap_dataset

    - name: SMD
      n_features: 38
      seq_len: 100
      path: smd_dataset

    - name: SWaT
      n_features: 51
      seq_len: 100
      path: swat_dataset

    - name: WADI
      n_features: 123
      seq_len: 100
      path: wadi_dataset

    - name: Yahoo-A1
      n_features: 1
      seq_len: 100
      path: yahoo_dataset

    - name: KPI
      n_features: 1
      seq_len: 100
      path: kpi_dataset

    - name: ECG5000
      n_features: 1
      seq_len: 140
      path: ecg5000_dataset
