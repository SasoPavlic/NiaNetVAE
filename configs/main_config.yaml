# main_config.yaml
nia_search:
  nsga3:
    # C13.4: NSGA-III sizing contract (no legacy population_size).
    # Reference directions are generated as:
    #   ref_dirs = get_reference_directions("das-dennis", 3, n_partitions)
    # Effective population size is driven by reference-direction count:
    #   effective_population = len(ref_dirs)
    # For 3 objectives this is combinatorial:
    #   effective_population = (n_partitions + 2) * (n_partitions + 1) / 2
    # Default n_partitions=5 -> effective_population=21.
    n_partitions: 1
  # with safety buffer for queue jitter, export, and manifest generation.
  time: "00:05:00"  # format: HH:MM:SS
  metrics:
    - SMAPE
  warm_start:
    # Experiment B (C10.1): seed cycle k>0 search from previous best cycle.
    enabled: true
    carry_over_ratio: 0.10
    perturb_ratio: 0.40
    perturbation_strength: 0.08

objectives:
  # C13.1 objective contract lock (configuration + validation only).
  # Objective semantics (for upcoming C13 implementation tasks):
  # - obj_error: minimize selected reconstruction metric (single metric key).
  # - obj_efficiency: minimize selected efficiency backend.
  # - obj_pdm: minimize (1 - pdm_signal_quality), where pdm_signal_quality = AUPRC_premaint.
  #
  # PdM label semantics must match metropt-pdm-framework:
  # - evaluate only operation phases 0/1
  # - positive class = phase 1
  # - phase 2 excluded
  error:
    metric: SMAPE        # allowed: MAE|MSE|RMSE|MAPE|RMAPE|SMAPE
  efficiency:
    metric: macs         # allowed: params|macs|latency_ms
  pdm:
    metric: auprc_premaint  # fixed allowed value in C13.1
  selection:
    # C13.5 deterministic winner-selection contract:
    # - pool: DB rows scoped by dataset_name (cycle-level DB scope)
    # - compute Pareto front on [obj_error, obj_efficiency, obj_pdm]
    # - normalize objectives with min-max per Pareto pool
    # - choose minimum weighted distance to ideal point (0,0,0)
    # - tie-break: lower obj_pdm, then lower obj_error, then lower obj_efficiency
    method: weighted_ideal_distance  # allowed: weighted_ideal_distance
    weights:
      error: 0.30
      efficiency: 0.20
      pdm: 0.50

workflow:
  # Workflow switch:
  # - baseline_search: current architecture-search workflow (default)
  # - per_maint_finetune: Experiment A sequential fine-tune workflow
  # - per_maint_warmstart_search: Experiment B warm-started NSGA3 per cycle
  mode: "per_maint_warmstart_search"
  finetune:
    # C5.3 controlled fine-tune defaults (used for cycle_id > 0)
    learning_rate_scale: 0.1
    min_epochs: 3
    max_epochs: 3

# Global parameters
model_params:
  name: 'RecurrentVariationalAutoencoder'

trainer_params:
  min_epochs: 5
  max_epochs: 5

exp_params:
  learning_rate: 0.01
  weight_decay: 0.001
  kld_weight: 0.1
  manual_seed: 42

logging_params:
  name: "RNNVAE"
  logger_file: "RNNAutoencoder.log"
  save_dir: "logs"
  db_storage: "logs/solutions.db"
  db_backend: "postgres"
  export_enabled: true
  model_export_dir: "logs/per_maint_models"

# Shared Data Loader parameters
data_loader_params:
  data_percentage: 100
  batch_size: 64
  val_size: 10
  num_workers: 0
  persistent_workers: False
  pin_memory: True

# Dataset configuration
dataset:
  config_file: "configs/metropt_config.yaml"
