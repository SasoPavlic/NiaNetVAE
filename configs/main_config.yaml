# main_config.yaml
nia_search:
  population_size: 20
  # Quick runtime estimate for MetroPT Experiment B full chain (cycles 0..21):
  # estimated_total_hours ~= 1.1 + 15 * search_hours
  # where:
  # - 1.1h is empirical fixed overhead from the last successful run
  # - 15 is the number of trainable cycles (the remaining 7 are alias / non-trainable)
  #
  # Examples:
  # - search 00:40:00 -> ~11.1h total
  # - search 01:05:00 -> ~17.4h total
  # - search 02:45:00 -> ~42.4h total
  #
  # Rule for Slurm:
  # sbatch_time_per_cycle ~= search_time + 00:30:00 buffer
  #
  # Current setting targets a Friday 10:30 -> Sunday 10:30 (~48h) window
  # with safety buffer for queue jitter, export, and manifest generation.
  time: "02:45:00"  # format: HH:MM:SS
  metrics:
    - SMAPE
  warm_start:
    # Experiment B (C10.1): seed cycle k>0 search from previous best cycle.
    enabled: true
    carry_over_ratio: 0.10
    perturb_ratio: 0.40
    perturbation_strength: 0.08

workflow:
  # Workflow switch:
  # - baseline_search: current architecture-search workflow (default)
  # - per_maint_finetune: Experiment A sequential fine-tune workflow
  # - per_maint_warmstart_search: Experiment B warm-started NSGA2 per cycle
  mode: "per_maint_warmstart_search"
  finetune:
    # C5.3 controlled fine-tune defaults (used for cycle_id > 0)
    learning_rate_scale: 0.1
    min_epochs: 3
    max_epochs: 3

# Global parameters
model_params:
  name: 'RecurrentVariationalAutoencoder'

trainer_params:
  min_epochs: 5
  max_epochs: 5

exp_params:
  learning_rate: 0.01
  weight_decay: 0.001
  kld_weight: 0.1
  manual_seed: 42

logging_params:
  name: "RNNVAE"
  logger_file: "RNNAutoencoder.log"
  save_dir: "logs"
  db_storage: "logs/solutions.db"
  db_backend: "postgres"
  export_enabled: true
  model_export_dir: "logs/per_maint_models"

# Shared Data Loader parameters
data_loader_params:
  data_percentage: 100
  batch_size: 64
  val_size: 10
  num_workers: 0
  persistent_workers: False
  pin_memory: True

# Dataset configuration
dataset:
  config_file: "configs/metropt_config.yaml"
