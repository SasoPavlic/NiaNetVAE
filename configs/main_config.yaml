# main_config.yaml
nia_search:
  runs: 1
  evaluations: 100
  algorithms:
    - particle_swarm
    - genetic_algorithm
    - firefly_algorithm
    - differential_evolution
    - self_adaptive_differential_evolution
  metrics:
    - MAE
    - MSE
    - RMSE
    - MAPE
    - RMAPE

# Global parameters
model_params:
  name: 'RecurrentVariationalAutoencoder'

trainer_params:
  min_epochs: 1
  max_epochs: 1

early_stop:
  monitor: "val_loss"
  patience: 1
  min_delta: 0.01
  mode: "min"

fine_tune_lr_finder:
  tune_n_epochs: 10
  lr_finder:
    mode: "exponential"  # Options: "exponential", "linear"
    num_training_steps: 100
    attr_name: "learning_rate"
    update_attr: True
    early_stop_threshold: null  # Set to null or a specific value

exp_params:
  weight_decay: 0.001
  kld_weight: 0.1
  manual_seed: 42

logging_params:
  name: "RNNVAE"
  logger_file: "RNNAutoencoder.log"
  save_dir: "logs/"
  db_storage: "logs/solution_mape_hpc.db"

# Shared Data Loader parameters
data_loader_params:
  data_percentage: 100
  batch_size: 32
  val_size: 10
  num_workers: 0
  persistent_workers: False
  pin_memory: True

# Dataset configuration
dataset:
  config_file: "configs/msl_config.yaml"
