# main_config.yaml

nia_search:
  runs: 1
  evaluations: 100
  algorithms:
    - particle_swarm
    - genetic_algorithm
    - firefly_algorithm
    - differential_evolution
    - self_adaptive_differential_evolution

# Global parameters
model_params:
  name: 'RecurrentVariationalAutoencoder'

trainer_params:
  min_epochs: 1
  max_epochs: 1

early_stop:
  monitor: "val_loss"
  patience: 1
  min_delta: 0.00
  mode: "min"

fine_tune_lr_finder:
  tune_n_epochs: 5
  lr_finder:
    mode: "exponential"  # Options: "exponential", "linear"
    num_training_steps: 10
    attr_name: "learning_rate"
    update_attr: True
    early_stop_threshold: null  # Set to null or a specific value

exp_params:
  weight_decay: 0.001
  kld_weight: 0.1
  manual_seed: 42

logging_params:
  name: "RNNVAE"
  logger_file: "RNNAutoencoder.log"
  save_dir: "logs/"
  db_storage: "logs/solution.db"

# Shared Data Loader parameters
data_loader_params:
  data_percentage: 100
  batch_size: 64
  train_size: 70
  val_size: 10
  test_size: 20
  num_workers: 15
  persistent_workers: False
  pin_memory: True

# Dataset configuration
dataset:
  config_file: "configs/kpi_config.yaml"

